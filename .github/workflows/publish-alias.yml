name: 'Publish version alias'

# Two triggers:
#  1. workflow_dispatch (manual — needs repo admin)
#  2. push tag alias-<version> (anyone with push access can fire it)
# Version scheme:
#   - plain dev builds: 0.0.46, 0.0.47, ...  → npm tag `next` (next-major dev line)
#   - legacy suffixed: 0.0.45-eslint-v8       → npm tag `eslint-v8-alias`
#   - workflow_dispatch `ref-tag` overrides the derived tag
on:
  workflow_dispatch:
    inputs:
      alias-version:
        description: 'Version to publish (plain dev build e.g. 0.0.46, or suffixed e.g. 0.0.45-eslint-v8)'
        required: true
        default: '0.0.46'
      ref-tag:
        description: 'npm dist-tag override (empty = derive: next / eslint-vN-alias)'
        required: false
        default: ''
  push:
    tags:
      - 'alias-*'

jobs:
  publish-alias:
    name: Publish alias version
    runs-on: ubuntu-latest
    environment: main
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Resolve alias version + npm tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # tag alias-<version> → strip prefix
            VERSION="${GITHUB_REF_NAME#alias-}"
          else
            VERSION="${{ inputs.alias-version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Derive the npm dist-tag. `latest` is reserved for stable majors;
          # these dev/alias builds always go under a non-latest tag.
          #   - versions with an `eslint-vN` suffix → `eslint-vN-alias`
          #     (legacy alias convention, e.g. 0.0.45-eslint-v8)
          #   - plain 0.0.x dev builds → `next` (the next-major dev line)
          #   - workflow_dispatch `ref-tag` input overrides both
          ESLINT_LINE=$(echo "$VERSION" | grep -oE 'eslint-v[0-9]+' || true)
          if [ -n "${{ inputs.ref-tag }}" ]; then
            NPM_TAG="${{ inputs.ref-tag }}"
          elif [ -n "$ESLINT_LINE" ]; then
            NPM_TAG="${ESLINT_LINE}-alias"
          else
            NPM_TAG="next"
          fi
          echo "npm-tag=$NPM_TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Set alias version
        run: npm pkg set version="${{ steps.meta.outputs.version }}"

      - name: Publish under alias tag
        run: |
          npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}
          npm publish --access public --tag "${{ steps.meta.outputs.npm-tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
