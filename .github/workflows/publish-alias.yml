name: 'Publish version alias'

# Two triggers:
#  1. workflow_dispatch (manual — needs repo admin)
#  2. push tag alias-<version> (anyone with push access can fire it)
on:
  workflow_dispatch:
    inputs:
      alias-version:
        description: 'Alias version (semver prerelease, e.g. 0.0.45-eslint-v8)'
        required: true
        default: '0.0.45-eslint-v8'
      ref-tag:
        description: 'npm dist-tag for the alias (NOT latest)'
        required: true
        default: 'eslint-v8-alias'
  push:
    tags:
      - 'alias-*'

jobs:
  publish-alias:
    name: Publish alias version
    runs-on: ubuntu-latest
    environment: main
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Resolve alias version + npm tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # tag alias-<version> → strip prefix
            VERSION="${GITHUB_REF_NAME#alias-}"
          else
            VERSION="${{ inputs.alias-version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "npm-tag=${{ inputs.ref-tag || 'eslint-v8-alias' }}" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Set alias version
        run: npm pkg set version="${{ steps.meta.outputs.version }}"

      - name: Publish under alias tag
        run: |
          npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}
          npm publish --access public --tag "${{ steps.meta.outputs.npm-tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
